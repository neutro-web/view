name: Release source guard

on:
  pull_request:
    branches: [release]

jobs:
  check-source:
    name: Source branch must be main
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is main
        run: |
          if [ "${{ github.head_ref }}" != "main" ]; then
            echo "PRs to 'release' must come from 'main'."
            echo "Source branch is '${{ github.head_ref }}' — close this PR and re-open from main."
            exit 1
          fi
