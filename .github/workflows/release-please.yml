name: Release Please

# Disabled for v0.1.0 — will be activated post-release to own future version bumps and tagging.
on:
  # Manual trigger only — uncomment the push trigger below when ready for automated releases
  workflow_dispatch:

  # Uncomment when ready: merging a PR into `release` triggers the release PR + GitHub release.
  # No code changes land on `release` directly — only PRs from `main`.
  # push:
  #   branches: [release]

jobs:
  release-please:
    name: Open release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          target-branch: release
